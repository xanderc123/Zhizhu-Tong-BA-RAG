# Building Intelligence RAG Agent - Configuration
# This is the main configuration file for the MCP Server.
# Edit this file to configure LLM, Embedding, VectorStore, and other services.

# =============================================================================
# LLM Configuration
# =============================================================================
llm:
  provider: "ollama"  # Options: openai, azure, ollama, deepseek
  model: "qwen3:8b"
  base_url: "http://localhost:11434/v1"
  deployment_name: "qwen3:8b"
  azure_endpoint: "https://YOUR_ENDPOINT.openai.azure.com/"
  api_version: "2024-02-15-preview"
  api_key: "ollama"
  temperature: 0.0
  max_tokens: 4096

# =============================================================================
# Embedding Configuration
# =============================================================================
embedding:
  provider: "ollama"  # Options: openai, azure, ollama
  model: "qwen3-embedding:8b"
  dimensions: 4096  # qwen3-embedding:8b 维度（必须指定）
  base_url: "http://localhost:11434/v1"
  # Azure-compatible settings (azure_endpoint triggers Azure compat mode):
  azure_endpoint: "https://YOUR_ENDPOINT.openai.azure.com/"
  deployment_name: "qwen3-embedding:8b"
  api_version: "2024-02-15-preview"
  api_key: "ollama"

# =============================================================================
# Vision LLM Configuration (for Image Captioning)
# =============================================================================
vision_llm:
  enabled: false  # Disabled to avoid VRAM overflow on 8GB GPU
  provider: "openai"  # Options: openai, azure, ollama
  model: "gpt-4o"  # Options: gpt-4o, gpt-4-vision-preview (OpenAI), llava (Ollama)
  # Azure-compatible settings (azure_endpoint triggers Azure compat mode):
  azure_endpoint: "https://YOUR_ENDPOINT.openai.azure.com/"
  deployment_name: "gpt-4o"
  api_version: "2024-02-15-preview"
  api_key: "YOUR_API_KEY_HERE"
  # Ollama-specific settings (if provider is ollama):
  # base_url: "http://localhost:11434"
  max_image_size: 2048  # Max dimension (width/height) for image compression

# =============================================================================
# Vector Store Configuration
# =============================================================================
vector_store:
  provider: "chroma"  # Options: chroma, qdrant, pinecone
  persist_directory: "./data/db/chroma"
  collection_name: "building_knowledge"

# =============================================================================
# Retrieval Configuration
# =============================================================================
retrieval:
  dense_top_k: 20
  sparse_top_k: 20
  fusion_top_k: 10
  rrf_k: 60  # RRF constant

# =============================================================================
# Rerank Configuration
# =============================================================================
rerank:
  enabled: false
  provider: "none"  # Options: none, cross_encoder, llm
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k: 5

# =============================================================================
# Evaluation Configuration
# =============================================================================
evaluation:
  enabled: false
  provider: "custom"  # Options: ragas, deepeval, custom
  metrics:
    - "hit_rate"
    - "mrr"
    - "faithfulness"

# =============================================================================
# Observability Configuration
# =============================================================================
observability:
  log_level: "INFO"  # Options: DEBUG, INFO, WARNING, ERROR
  trace_enabled: true
  trace_file: "./logs/traces.jsonl"
  structured_logging: true

# =============================================================================
# Ingestion Configuration
# =============================================================================
ingestion:
  chunk_size: 1000
  chunk_overlap: 200
  splitter: "recursive"  # Options: recursive, semantic, fixed_length
  batch_size: 100
  
  # Chunk Refiner Configuration (C5)
  chunk_refiner:
    use_llm: false  # Disabled to avoid VRAM overflow on 8GB GPU
    # When use_llm is false or LLM call fails, falls back to rule-based refinement

  # Metadata Enricher Configuration (C6)
  metadata_enricher:
    use_llm: false  # Disabled to avoid VRAM overflow on 8GB GPU
    # When use_llm is false or LLM call fails, falls back to rule-based enrichment
